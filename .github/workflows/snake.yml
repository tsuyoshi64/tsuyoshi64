name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      # Needed so the post-processor script (.github/scripts/) is available
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1. Generate raw contribution grid SVG ──────────────────────────────
      # 5-level depth-scaled neon palette:
      #   L0 (#161b22)  — empty     — near-black
      #   L1 (#2d1b4e)  — 1–3 days  — deep purple
      #   L2 (#7b2fbe)  — 4–6 days  — bright violet (more distinct from L1 on dark bg)
      #   L3 (#bf00ff)  — 7–9 days  — bright magenta
      #   L4 (#ff00ff)  — 10+ days  — hot-pink neon
      #   snake (#00f5ff)            — electric cyan
      - name: Generate snake SVG (base)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-raw.svg?color_snake=00f5ff&color_dots=#161b22,#2d1b4e,#7b2fbe,#bf00ff,#ff00ff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 2. Fetch the real total-contributions count via GraphQL ─────────────
      # snk does not expose this number — we query it ourselves so the overlay
      # can show an accurate "X contributions in the last year" line instead
      # of an approximation derived from dot-color buckets. Implemented as a
      # standalone script (not inline bash+curl) to avoid fragile nested
      # quote-escaping in a GraphQL JSON body inside a YAML block scalar.
      - name: Fetch total contributions
        run: python .github/scripts/fetch_contrib_total.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      # ── 3. Post-process: inject neon effects + calendar chrome ──────────────
      - name: Apply neon post-processing
        run: python .github/scripts/enhance_snake.py

      # ── 4. Push enhanced SVG to the output branch ──────────────────────────
      # snake-raw.svg is deleted by the script, so only the final file is pushed.
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
