name: Generate Language Legend

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Fetch language byte-totals via GraphQL and render the legend SVG ───
      # GraphQL is used directly (same pattern as fetch_contrib_total.py)
      # rather than depending on github-readme-stats, since the goal here is
      # a dots+name+percentage legend with NO progress bar — a layout
      # github-readme-stats does not offer (hide_progress=true removes the
      # percentages too, not just the bar).
      - name: Generate language legend SVG
        run: python .github/scripts/lang_legend.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      # ── Push to its own dedicated output branch ─────────────────────────────
      # Deliberately NOT the same "output" branch snake.yml uses: both
      # workflows force-push (keep_history: false) whatever is in dist/ at
      # that moment, so two workflows sharing one branch would alternately
      # wipe each other's SVG depending on which run finishes last. Separate
      # branches make that race condition impossible instead of just unlikely.
      - name: Push to output-langs branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output-langs
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
